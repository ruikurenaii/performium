name: Daily Build
run-name: Performium Daily Build (#${{ github.run_number }} - v${{ steps.date.outputs.date }})

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'latest'
      - name: Run build script
        run: bash bashQuickBuild.sh
      - name: Release Artifact (v4)
        uses: actions/upload-artifact@v4
        with:
          name: performium
          path: performium
